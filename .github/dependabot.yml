version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      npm-dev-dependencies:
        dependency-type: "development"
      npm-production-dependencies:
        dependency-type: "production"
    ignore:
      # @typescript-eslint does not yet support TypeScript 7.x
      # (peerDependency: "typescript": ">=4.8.4 <6.1.0" as of 8.64.0)
      - dependency-name: "typescript"
        versions: [">=7.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
