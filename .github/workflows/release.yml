name: リリース

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  create-release:
    name: GitHub Release 作成
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Release を作成
        uses: softprops/action-gh-release@v3
        with:
          name: "Clip Fuse ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: ビルド & アップロード (Windows)
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: チェックアウト
        uses: actions/checkout@v7

      - name: Node.js セットアップ
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: FFmpeg ダウンロード (Windows)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Write-Host "FFmpeg をダウンロード中..."
          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extracted -Force
          $binDir = Get-ChildItem ffmpeg-extracted -Filter "bin" -Recurse -Directory |
            Select-Object -First 1
          Copy-Item "$($binDir.FullName)/ffmpeg.exe"  -Destination "ffmpeg/"
          Copy-Item "$($binDir.FullName)/ffprobe.exe" -Destination "ffmpeg/"
          Remove-Item -Recurse -Force ffmpeg-extracted, ffmpeg.zip
          Write-Host "FFmpeg セットアップ完了"

      - name: テスト実行
        run: npm run test:coverage

      - name: アプリをビルド
        run: npx electron-vite build && npx electron-builder --publish never

      - name: GitHub Release にファイルを追加
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    name: ビルド & アップロード (Linux)
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: チェックアウト
        uses: actions/checkout@v7

      - name: Node.js セットアップ
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: FFmpeg セットアップ (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          mkdir -p ffmpeg
          cp "$(which ffmpeg)" ffmpeg/ffmpeg
          cp "$(which ffprobe)" ffmpeg/ffprobe

      - name: テスト実行
        run: npm run test:coverage

      - name: アプリをビルド
        run: npx electron-vite build && npx electron-builder --publish never

      - name: GitHub Release にファイルを追加
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
