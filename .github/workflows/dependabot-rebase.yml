name: Dependabot リベース

# main に push されるたびに（他の PR マージ後など）
# オープン中の Dependabot PR を @dependabot rebase で最新化する。
# Dependabot がリベース後に CI を自動実行するので、
# CI 通過を確認してから手動でマージする。
on:
  push:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  rebase:
    name: Dependabot PR をリベース
    runs-on: ubuntu-latest

    steps:
      - name: オープン中の Dependabot PR をリベース
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const dependabotPRs = prs.filter(pr => pr.user.login === 'dependabot[bot]');

            if (dependabotPRs.length === 0) {
              core.info('オープン中の Dependabot PR はありません');
              return;
            }

            for (const pr of dependabotPRs) {
              core.info(`PR #${pr.number} をリベース: ${pr.title}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '@dependabot rebase',
              });
            }

            core.info(`${dependabotPRs.length} 件の Dependabot PR にリベースを要求しました`);
